substitutions:
  _REGION: us-central1
  _REPOSITORY: nexus-burplefolk
  _BACKEND_SERVICE: nexus-api
  _FRONTEND_SERVICE: nexus-ui
  _BACKEND_IMAGE: nexus-api
  _FRONTEND_IMAGE: nexus-ui
  _BACKEND_URL: ""
  _CORS_ALLOW_ORIGINS: "*"

steps:
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_IMAGE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_IMAGE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_IMAGE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - CORS_ALLOW_ORIGINS=${_CORS_ALLOW_ORIGINS}

  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -f
      - nexus-ui/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRONTEND_IMAGE}:$BUILD_ID
      - --build-arg
      - VITE_API_BASE=${_BACKEND_URL}
      - nexus-ui

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRONTEND_IMAGE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRONTEND_IMAGE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BACKEND_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_FRONTEND_IMAGE}:$BUILD_ID
