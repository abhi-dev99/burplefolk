
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --head-bg: #dbeafe;
      --head-stroke: #1d4ed8;
      --body-stroke: #93c5fd;
      --line: #1e3a8a;
      --line-soft: #cbd5e1;
      --pk: #1d4ed8;
      --fk: #b91c1c;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
    }
    .erd-shell {
      width: 100%;
      height: 720px;
      border: 1px solid rgba(164, 182, 199, 0.35);
      border-radius: 10px;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }
    .erd-toolbar {
      position: absolute;
      top: 8px;
      right: 10px;
      z-index: 2;
      display: flex;
      gap: 8px;
    }
    .erd-toolbar button {
      border: 1px solid #94a3b8;
      background: #ffffff;
      color: #0f172a;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .erd-toolbar button:hover {
      background: #f1f5f9;
    }
    .erd-note {
      position: absolute;
      top: 10px;
      left: 12px;
      z-index: 2;
      font-size: 12px;
      color: #475569;
    }
    .erd-canvas {
      position: absolute;
      inset: 0;
      overflow: auto;
      cursor: grab;
    }
    .erd-canvas.dragging {
      cursor: grabbing;
    }
    .rel-line {
      stroke: var(--line);
      stroke-width: 1.8;
      opacity: 0.92;
    }
    .rel-label {
      font-size: 11px;
      fill: #0f172a;
      paint-order: stroke;
      stroke: #ffffff;
      stroke-width: 3;
      stroke-linejoin: round;
    }
    .entity-body {
      fill: #ffffff;
      stroke: var(--body-stroke);
      stroke-width: 1.3;
    }
    .entity-head {
      fill: var(--head-bg);
      stroke: var(--head-stroke);
      stroke-width: 1.3;
    }
    .entity-title {
      font-size: 13px;
      font-weight: 700;
      fill: #0f172a;
      letter-spacing: 0.3px;
    }
    .row-sep {
      stroke: var(--line-soft);
      stroke-width: 1;
    }
    .col-dtype {
      font-size: 10px;
      font-weight: 700;
      fill: #475569;
    }
    .col-name {
      font-size: 11px;
      fill: #0f172a;
    }
    .col-role {
      font-size: 10px;
      font-weight: 700;
    }
    .col-role.pk { fill: var(--pk); }
    .col-role.fk { fill: var(--fk); }
  </style>
</head>
<body>

  <script>
    const shell = document.getElementById('erd-shell');
    const canvas = document.getElementById('erd-canvas');
    const viewport = document.getElementById('erd-viewport');

    let scale = 1;
    let tx = 24;
    let ty = 24;
    let dragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let startTx = 0;
    let startTy = 0;

    const minScale = 0.35;
    const maxScale = 2.8;

    const applyTransform = () => {
      viewport.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
    };

    const clampScale = (value) => Math.max(minScale, Math.min(maxScale, value));

    window.zoomInErd = () => {
      scale = clampScale(scale * 1.12);
      applyTransform();
    };

    window.zoomOutErd = () => {
      scale = clampScale(scale * 0.89);
      applyTransform();
    };

    window.resetErd = () => {
      scale = 1;
      tx = 24;
      ty = 24;
      applyTransform();
    };

    window.fitErd = () => {
      const width = 974;
      const height = 546;
      const targetW = shell.clientWidth - 48;
      const targetH = shell.clientHeight - 48;
      if (targetW <= 0 || targetH <= 0) return;

      scale = clampScale(Math.min(targetW / width, targetH / height));
      tx = 20;
      ty = 20;
      applyTransform();
    };

    canvas.addEventListener('wheel', (event) => {
      event.preventDefault();
      const factor = event.deltaY < 0 ? 1.08 : 0.92;
      scale = clampScale(scale * factor);
      applyTransform();
    }, { passive: false });

    canvas.addEventListener('mousedown', (event) => {
      dragging = true;
      canvas.classList.add('dragging');
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      startTx = tx;
      startTy = ty;
    });

    window.addEventListener('mousemove', (event) => {
      if (!dragging) return;
      tx = startTx + (event.clientX - dragStartX);
      ty = startTy + (event.clientY - dragStartY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      canvas.classList.remove('dragging');
    });

    applyTransform();
  </script>
