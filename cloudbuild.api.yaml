steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/burplefolk/burplefolk-api:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/burplefolk/burplefolk-api:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - burplefolk-api
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/burplefolk/burplefolk-api:$BUILD_ID
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
